<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cipherer</title>
    <link rel="icon" href="cipher.png" type="image/png">
</head>

<body>

    <div class="container">
        <h1>Text Encryptor and Decryptor</h1>
        <label for="message">Message :</label>
        <textarea id="message" rows="5"
            cols="50">Enter your message to encrypt or decrypt here...</textarea>
        <label for="key">Key :</label>
        <input type="text" id="key" value="Enter the shift/key (number)" size="50">
        <div class="buttons">
            <button id="enc-btn">Encrypt</button>
            <button id="dec-btn">Decrypt</button>
        </div>

        <h2>Result:</h2>
        <div id="result"></div>

    </div>


    <script src="index.js"></script>
</body>

</html>
